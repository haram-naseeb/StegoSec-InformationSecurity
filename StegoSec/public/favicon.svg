  <circle cx="16" cy="16" r="15" stroke="#00FF41" stroke-width="1.5" />
  
  <!-- Lock shape -->
  <rect x="10" y="14" width="12" height="10" rx="2" fill="#00FF41" fill-opacity="0.3" stroke="#00FF41" stroke-width="1.5" />
  
  <!-- Lock shackle -->
  <path
    d="M11 14C11 10.5 13.5 8 16 8C18.5 8 21 10.5 21 14"
    stroke="#00FF41"
    stroke-width="1.5"
    fill="none"
    stroke-linecap="round"
  />
  
  <!-- Key hole -->
  <circle cx="16" cy="19" r="2" fill="#00FF41" />
  
  <!-- Hidden data indicator dots -->
  <circle cx="13" cy="22" r="1" fill="#00FF41" fill-opacity="0.6" />
  <circle cx="19" cy="22" r="1" fill="#00FF41" fill-opacity="0.6" />
  
